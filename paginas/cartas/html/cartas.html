<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas</title>
    <link rel="stylesheet" href="../css/cartas.css">
</head>
<body>
    <div class="encabezado">
        <h1 class="titulo">Cartas</h1>
        <p class="descripcion">Elige un tipo o deja que sea aleatorio.</p>
    </div>

    <div class="contenedor">
        <button id="desafio-btn" class="boton">Desafío</button>
        <button id="pregunta-btn" class="boton">Pregunta Íntima</button>
        <button id="fantasia-btn" class="boton">Fantasía</button>
        <button id="sensacion-btn" class="boton">Sensación</button>
        <button id="sacar-carta-btn" class="boton">Sacar Carta Aleatoria</button>

        <div id="contenedor-carta" class="resultado">
            <p id="texto-carta">Haz clic en un botón para comenzar...</p>
        </div>
    </div>

    <script src="../js/cartas.js"></script>
</body>
</html>
