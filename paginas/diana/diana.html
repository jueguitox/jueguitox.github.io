<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diana — Jueguitox</title>
        <link rel="shortcut icon" href="../../../assets/iconos/ico-diana.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="diana.css">
</head>
<body>
    <a href="../../../index.html" class="back-btn">Inicio</a>

    <header>
        <span class="eyebrow">✦ Jueguitox</span>
        <h1>Diana</h1>
        <p class="header-sub">Apunta · Lanza · Cumple</p>
    </header>

    <div class="contenedor">

        <!-- MODO -->
        <div class="modo-row">
            <span class="modo-lbl">Nivel:</span>
            <button class="btn-modo activo" data-modo="suave">Suave</button>
            <button class="btn-modo" data-modo="picante">Picante 🌶</button>
            <button class="btn-modo" data-modo="salvaje">Salvaje 🔥</button>
        </div>

        <!-- TURNO -->
        <div class="turno-strip">
            <span class="turno-lbl">Turno de:</span>
            <div class="turno-jugadores">
                <button class="btn-jugador activo" data-j="0">Jugador 1</button>
                <button class="btn-jugador" data-j="1">Jugador 2</button>
            </div>
        </div>

        <!-- DIANA -->
        <div class="diana-wrap" id="diana-wrap">
            <canvas id="diana-canvas" width="300" height="300"></canvas>
            <div class="dardo-indicator" id="dardo-indicator">
                <span>🎯</span>
            </div>
            <button class="btn-lanzar" id="btn-lanzar">
                <span>🎯 Lanzar</span>
            </button>
        </div>

        <!-- MARCADOR -->
        <div class="marcadores">
            <div class="marcador-card" id="mc-0">
                <p class="mc-nombre">Jugador 1</p>
                <p class="mc-val" id="score-0">0</p>
                <p class="mc-sub">puntos</p>
            </div>
            <div class="marcador-vs">VS</div>
            <div class="marcador-card" id="mc-1">
                <p class="mc-nombre">Jugador 2</p>
                <p class="mc-val" id="score-1">0</p>
                <p class="mc-sub">puntos</p>
            </div>
        </div>

        <!-- RESULTADO -->
        <div class="result-card" id="result-card">
            <div class="result-header">
                <div class="result-dot" id="result-dot"></div>
                <span class="result-lbl" id="result-lbl">—</span>
            </div>
            <div class="result-body">
                <p id="result-texto"></p>
            </div>
        </div>

        <!-- HISTORIAL RONDAS -->
        <div class="rondas-wrap" id="rondas-wrap" style="display:none">
            <span class="rondas-lbl">Historial</span>
            <div class="rondas-list" id="rondas-list"></div>
        </div>

        <button class="btn-secondary" id="btn-reset">↺ Reiniciar partida</button>
    </div>

    <footer>
        <a href="../../../paginas/html/acerca.html">Acerca de</a>
        <a href="../../../paginas/html/condiciones.html">Condiciones</a>
        <a href="../../../paginas/html/privacidad.html">Privacidad</a>
    </footer>

    <script src="diana.js"></script>
</body>
</html>
